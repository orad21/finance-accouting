<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts Receivable - FinanceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="styles/main.css" rel="stylesheet">
    <link href="styles/accounts-receivable.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
    <div class="container-fluid p-0">
        <div class="row g-0 min-vh-100">
            <!-- Sidebar -->
            <nav class="col-lg-auto sidebar">
                <div class="d-flex flex-column min-vh-100" style="width: 280px;">
                    <!-- Logo -->
                    <div class="d-flex align-items-center gap-2 px-4 py-3 border-bottom border-secondary">
                        <i class="bi bi-wallet2 fs-4"></i>
                        <span class="fw-bold">FinanceHub</span>
                    </div>
                    
                    <!-- Search -->
                    <div class="px-3 py-3">
                        <input type="text" class="form-control search-input" placeholder="Search">
                    </div>
                    
                    <!-- Navigation -->
                    <div class="flex-grow-1 px-2">
                        <div class="nav-container">
                            <button class="nav-btn" data-page="index.html">
                                <i class="bi bi-grid"></i>
                                <span>Dashboard</span>
                            </button>
                            <button class="nav-btn" data-page="index.html">
                                <i class="bi bi-journal-text"></i>
                                <span>General Ledger</span>
                            </button>
                            <button class="nav-btn" data-page="index.html">
                                <i class="bi bi-airplane"></i>
                                <span>Travel Management</span>
                            </button>
                            <button class="nav-btn active" data-page="accounts-receivable.html">
                                <i class="bi bi-arrow-down-circle"></i>
                                <span>Accounts Receivable</span>
                            </button>
                            <button class="nav-btn" data-page="accounts-payable.html">
                                <i class="bi bi-arrow-up-circle"></i>
                                <span>Accounts Payable</span>
                            </button>
                            <button class="nav-btn">
                                <i class="bi bi-building"></i>
                                <span>Asset Accounting</span>
                            </button>
                            <button class="nav-btn">
                                <i class="bi bi-bank"></i>
                                <span>Bank Accounting</span>
                            </button>
                        </div>
                    </div>
                </div>
            </nav>
            
            <!-- Main Content -->
            <main class="col p-4">
                <!-- Header -->
                <div class="mb-4">
                    <h1 class="h2 mb-1 fw-bold">Accounts Receivable</h1>
                    <small class="text-muted">Manage your receivables and collections</small>
                </div>
                
                <!-- Top Row - AR Aging and At Risk Customer -->
                <div class="row g-4 mb-4">
                    <!-- AR Aging -->
                    <div class="col-md-6">
                        <div class="chart-card">
                            <h3 class="h5 fw-semibold mb-4">AR Aging</h3>
                            <div style="height: 300px;">
                                <canvas id="arAgingChart"></canvas>
                            </div>
                        </div>
                    </div>
                    
                    <!-- At Risk Customer -->
                    <div class="col-md-6">
                        <div class="chart-card">
                            <h3 class="h5 fw-semibold mb-4">At Risk Customer</h3>
                            <div class="customer-table">
                                <div class="customer-header">
                                    <div class="customer-col">Customer</div>
                                    <div class="customer-col">Balance</div>
                                    <div class="customer-col">Most Value</div>
                                </div>
                                <div class="customer-body" id="customerList">
                                    <!-- Customer rows will be populated by JavaScript -->
                                </div>
                                <div class="top-customer-indicator">
                                    <span class="top-customer-text">Top Customer</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Collections -->
                <div class="chart-card">
                    <h3 class="h5 fw-semibold mb-4">Collections</h3>
                    <div class="collections-content">
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <div class="collection-metric">
                                    <label class="collection-label">Collected</label>
                                    <div class="collection-value text-success" id="collectedAmount">$400,000</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="collection-metric">
                                    <label class="collection-label">Expected</label>
                                    <div class="collection-value" id="expectedAmount">$500,000</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="d-flex align-items-center gap-3 mb-4">
                            <button class="btn btn-primary" id="addPaymentBtn">
                                <i class="bi bi-plus me-2"></i>Add Payment
                            </button>
                            <div class="add-payment-form d-none" id="addPaymentForm">
                                <input type="text" class="form-control me-2" placeholder="Enter amount" id="paymentInput" style="width: 150px;">
                                <button class="btn btn-success btn-sm me-2" id="confirmPayment">Add</button>
                                <button class="btn btn-outline-secondary btn-sm" id="cancelPayment">Cancel</button>
                            </div>
                        </div>
                        
                        <!-- Progress Bar -->
                        <div class="progress-section">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted small">Collection Progress</span>
                                <span class="text-muted small" id="progressPercentage">80%</span>
                            </div>
                            <div class="progress" style="height: 8px;">
                                <div class="progress-bar bg-success" id="progressBar" style="width: 80%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/accounts-receivable.js"></script>
    <script src="js/main.js"></script>
    <script src="js/transitions.js"></script>
</body>
</html>
